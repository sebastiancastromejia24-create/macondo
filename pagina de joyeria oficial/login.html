<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Macondo</title>

    <link rel="stylesheet" href="login.css">

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

    <ul class="menu">

        <li>
            <a href="index.html">
                Inicio
            </a>
        </li>

        <li>
            <a href="eventos.html">
                Eventos
            </a>
        </li>

        <li class="logo">

            <h1>MACONDO</h1>

            <span>JOYERÍA</span>

        </li>

        <li>
            <a href="registro.html">
                Registro
            </a>
        </li>

        <li>
            <a class="active" href="login.html">
                Login
            </a>
        </li>

    </ul>

</header>

<!-- LOGIN -->
<section class="login-container">

    <!-- IZQUIERDA -->
    <div class="left-side">

        <div class="overlay"></div>

        <div class="left-content">

            <h2>BIENVENIDO</h2>

            <p>
                Accede a tu cuenta y descubre
                el lujo exclusivo de Macondo.
            </p>

        </div>

    </div>

    <!-- DERECHA -->
    <div class="right-side">

        <div class="form-box">

            <h2>INICIAR SESIÓN</h2>

            <form onsubmit="login(event)">

                <input
                        type="email"
                        id="correo"
                        placeholder="Correo electrónico"
                        required
                >

                <input
                        type="password"
                        id="password"
                        placeholder="Contraseña"
                        required
                >

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Recordarme

                    </label>

                    <a href="#">

                        ¿Olvidaste tu contraseña?

                    </a>

                </div>

                <button type="submit">

                    INGRESAR

                </button>

            </form>

            <p class="register-link">

                ¿No tienes cuenta?

                <a href="registro.html">

                    Regístrate

                </a>

            </p>

        </div>

    </div>

</section>

<script src="base.js"></script>

</body>

</html>
