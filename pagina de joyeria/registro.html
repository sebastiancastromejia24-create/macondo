<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Macondo</title>

    <link rel="stylesheet" href="registro.css">

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <ul class="menu">

            <li><a href="index.html">Inicio</a></li>

            <li><a href="eventos.html">Eventos</a></li>

            <li class="logo">
                <h1>MACONDO</h1>
                <span>JOYERÍA</span>
            </li>

            <li><a class="active" href="registro.html">Registro</a></li>

            <li><a href="login.html">Login</a></li>

        </ul>

    </header>

    <!-- CONTENIDO -->
    <section class="register-container">

        <!-- IZQUIERDA -->
        <div class="left-side">

            <div class="overlay"></div>

            <div class="left-content">

                <h2>ÚNETE A MACONDO</h2>

                <p>
                    Crea tu cuenta y descubre un mundo
                    de exclusividad y elegancia.
                </p>

            </div>

        </div>

        <!-- DERECHA -->
        <div class="right-side">

            <div class="form-box">

                <h2>CREA TU CUENTA</h2>

                <form>

                    <input type="text" placeholder="Nombre completo">

                    <input type="email" placeholder="Correo electrónico">

                    <input type="password" placeholder="Contraseña">

                    <input type="password" placeholder="Confirmar contraseña">

                    <div class="check">

                        <input type="checkbox">

                        <p>
                            Acepto los
                            <span>términos y condiciones</span>
                        </p>

                    </div>

                    <button>REGISTRARME</button>

                </form>

                <p class="login-link">
                    ¿Ya tienes cuenta?
                    <a href="login.html">Inicia sesión</a>
                </p>

            </div>

        </div>

    </section>

</body>
</html>
