spring.application.name=macondo-jewelry


# MYSQL CLEVER CLOUD

spring.datasource.url=jdbc:mysql://${MYSQL_ADDON_HOST}:${MYSQL_ADDON_PORT}/${MYSQL_ADDON_DB}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=${MYSQL_ADDON_USER}

spring.datasource.password=${MYSQL_ADDON_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE


spring.jpa.hibernate.ddl-auto=update

spring.jpa.open-in-view=false

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# SWAGGER


springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html

# SERVER ERRORS

server.error.include-message=always

server.error.include-binding-errors=always

# JWT

app.security.jwt-secret=${JWT_SECRET:macondo-super-secret-key-2026}

app.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:120}


# RESERVATIONS

app.reservations.ttl-minutes=${RESERVATION_TTL_MINUTES:8}

# WOMPI

wompi.public-key=${WOMPI_PUBLIC_KEY:pub_test_placeholder}

wompi.integrity-secret=${WOMPI_INTEGRITY_SECRET:integrity_test_placeholder}

wompi.webhook-secret=${WOMPI_WEBHOOK_SECRET:webhook_test_placeholder}

wompi.currency=${WOMPI_CURRENCY:COP}

wompi.commission-rate=${WOMPI_COMMISSION_RATE:0.032}

wompi.fixed-fee-cents=${WOMPI_FIXED_FEE_CENTS:70000}

