spring.application.name=macondo-jewelry

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:macondo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-message=always
server.error.include-binding-errors=always

app.security.jwt-secret=${JWT_SECRET:dev-secret-change-this-value-with-32-chars}
app.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.reservations.ttl-minutes=${RESERVATION_TTL_MINUTES:8}

wompi.public-key=${WOMPI_PUBLIC_KEY:pub_test_placeholder}
wompi.integrity-secret=${WOMPI_INTEGRITY_SECRET:integrity_test_placeholder}
wompi.webhook-secret=${WOMPI_WEBHOOK_SECRET:webhook_test_placeholder}
wompi.currency=${WOMPI_CURRENCY:COP}
wompi.commission-rate=${WOMPI_COMMISSION_RATE:0.032}
wompi.fixed-fee-cents=${WOMPI_FIXED_FEE_CENTS:70000}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
