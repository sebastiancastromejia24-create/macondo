spring.application.name=macondo-jewelry


spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/macondo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT:org.hibernate.dialect.MySQL8Dialect}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.error.include-message=always
server.error.include-binding-errors=always

app.security.jwt-secret=${JWT_SECRET:dev-secret-change-this-value-with-32-chars}
app.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.reservations.ttl-minutes=${RESERVATION_TTL_MINUTES:8}

wompi.public-key=${WOMPI_PUBLIC_KEY:pub_test_placeholder}
wompi.integrity-secret=${WOMPI_INTEGRITY_SECRET:integrity_test_placeholder}
wompi.webhook-secret=${WOMPI_WEBHOOK_SECRET:webhook_test_placeholder}
wompi.currency=${WOMPI_CURRENCY:COP}
wompi.commission-rate=${WOMPI_COMMISSION_RATE:0.032}
wompi.fixed-fee-cents=${WOMPI_FIXED_FEE_CENTS:70000}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
